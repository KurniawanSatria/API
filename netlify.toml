[build]
command = "npm run build"
publish = ".next"

[build.environment]
NETLIFY_NEXT_PLUGIN_SKIP = "false"

[[plugins]]
package = "@netlify/plugin-nextjs"

[[headers]]
for = "/_next/static/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/api/*"
  [headers.values]
  Cache-Control = "no-store"

[[redirects]]
from = "/_next/image"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200

  [redirects.query]
  url = ":url"
  w = ":width"
  q = ":quality"

[[redirects]]
from = "/_ipx/*"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200

  [redirects.query]
  url = ":url"
  w = ":width"
  q = ":quality"

[context.production]

  [[context.production.headers]]
  for = "/_next/static/*"

    [context.production.headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[context.main]

  [[context.main.headers]]
  for = "/_next/static/*"

    [context.main.headers.values]
    Cache-Control = "public, max-age=31536000, immutable"